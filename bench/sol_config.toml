# SOL configuration for NVIDIA DGX Spark / GB10 (sm_121).
# Used by bench/_solar.py.
#
# VERIFIED values come from cudaDeviceProp / nvidia-smi.
# PLACEHOLDER peak_tflops are SOL targets — calibrate via
# bash bench/calibrate_peaks.sh for absolute scores. Until then, SOL Scores
# are only meaningful for relative comparison across runs A/B/C.

[gb10]
sm = "sm_121"
sm_count = 48                   # VERIFIED via cudaDeviceProp.multi_processor_count
l2_cache_mb = 24                # VERIFIED via cudaDeviceProp.L2_cache_size
unified_mem_gb = 124.6          # VERIFIED via cudaDeviceProp.total_memory

# Grace LPDDR5X-8533 × 4 channels ≈ 273 GB/s peak.
# Verify with the Tier 2 `bandwidth` test before trusting bandwidth SOL.
mem_bandwidth_tb_s = 0.273

[gb10.peak_tflops]
# PLACEHOLDER ~1.1× highest measured TFLOPs across runs A/B/C.
# Replace with GB10 datasheet or bench/calibrate_peaks.sh output.
fp16       = 90.0
bf16       = 90.0
fp8        = 185.0
fp4        = 350.0
sparse_fp8 = 370.0   # cuSPARSELt 2:4 effective TFLOPs ceiling
