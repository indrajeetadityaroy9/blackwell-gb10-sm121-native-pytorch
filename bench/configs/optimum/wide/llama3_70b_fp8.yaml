defaults:
  - benchmark
  - scenario: inference
  - launcher: process
  - backend: pytorch
  - _base_
  - _self_

# Llama-3-70B fits 124 GB only with sub-BF16 quantization. FP8 dynamic
# (e4m3) leaves ~70 GB for weights + activations + KV cache. BF16 (140 GB)
# would OOM; INT8 (70 GB) is the only stock-bitsandbytes option that fits
# but is slower; FP8 is the higher-fidelity choice for benchmarking the
# wheel's torch._scaled_mm path.
name: llama3_70b_fp8

backend:
  model: meta-llama/Llama-3.1-70B
  torch_dtype: bfloat16   # compute dtype; FP8 is the weight quant
  no_weights: false
  quantization_scheme: fp8
  quantization_config:
    weight_dtype: float8_e4m3fn

scenario:
  input_shapes:
    batch_size: 1
    sequence_length: 512
  generate_kwargs:
    max_new_tokens: 128
    min_new_tokens: 128
