defaults:
  - benchmark
  - scenario: inference
  - launcher: process
  - backend: pytorch
  - _base_
  - _self_

name: mixtral_8x7b_int8

backend:
  model: mistralai/Mixtral-8x7B-v0.1
  torch_dtype: bfloat16   # compute dtype; bitsandbytes does 8-bit weight load
  no_weights: false
  quantization_scheme: bnb
  quantization_config:
    load_in_8bit: true

scenario:
  input_shapes:
    batch_size: 1
    sequence_length: 512
  generate_kwargs:
    max_new_tokens: 128
    min_new_tokens: 128
